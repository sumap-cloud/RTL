name: R10 POS Test Automation

on:
  workflow_dispatch:  # Allows manual trigger from GitHub UI
  push:
    branches: [ main ]

jobs:
  test-happy-flow:
    runs-on: [self-hosted, Windows, X64]

    steps:
    - name: Checkout code
      run: |
        git config --global --add safe.directory $env:GITHUB_WORKSPACE
        if (Test-Path "$env:GITHUB_WORKSPACE\.git") {
          git -C "$env:GITHUB_WORKSPACE" fetch --all
          git -C "$env:GITHUB_WORKSPACE" reset --hard origin/main
        } else {
          git clone https://github.com/khadarbasha2609/R10_Pywin_Automation.git "$env:GITHUB_WORKSPACE"
        }

    - name: Verify Python environment
      run: |
        python --version

    - name: Run Happy Flow Test
      working-directory: Scripts\POS_Workspace
      run: |
        pytest "tests\PyTest Demo\TC_HappyFlow.py" -v --tb=short
      continue-on-error: true
