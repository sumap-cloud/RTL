name: R10 POS Test Automation

on:
  workflow_dispatch:  # Allows manual trigger from GitHub UI
  push:
    branches: [ main ]

jobs:
  test-happy-flow:
    runs-on: [self-hosted, Windows, X64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Verify Python environment
      run: |
        python --version

    - name: Run Happy Flow Test
      working-directory: Scripts\POS_Workspace
      run: |
        pytest "tests\PyTest Demo\TC_HappyFlow.py" -v --tb=short
      continue-on-error: true
