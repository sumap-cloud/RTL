name: R10 POS Test Automation

on:
  workflow_dispatch:  # Allows manual trigger from GitHub UI
  push:
    branches: [ main ]

jobs:
  test-basic-sale-flow:
    runs-on: [self-hosted, Windows, X64]

    steps:
    - name: Checkout code
      shell: powershell
      run: |
        Write-Host "GITHUB_WORKSPACE = $env:GITHUB_WORKSPACE"
        git config --global --add safe.directory $env:GITHUB_WORKSPACE
        if (Test-Path "$env:GITHUB_WORKSPACE\.git") {
          Write-Host "Repo exists, pulling latest..."
          git -C "$env:GITHUB_WORKSPACE" fetch --all
          git -C "$env:GITHUB_WORKSPACE" reset --hard origin/main
        } else {
          Write-Host "Cloning repo..."
          git clone https://github.com/khadarbasha2609/R10_Pywin_Automation.git "$env:GITHUB_WORKSPACE"
        }
        Write-Host "Checkout complete. Files:"
        Get-ChildItem "$env:GITHUB_WORKSPACE" | Select-Object Name

    - name: Install dependencies from offline packages
      shell: powershell
      run: |
        $offlineDir = "$env:GITHUB_WORKSPACE\Offline_lib\offline_packages"
        Write-Host "Installing packages from: $offlineDir"
        & "$env:GITHUB_WORKSPACE\Scripts\python.exe" -m pip install `
          --no-index `
          --find-links="$offlineDir" `
          pytest pytest-html pytest-metadata pywinauto pywin32 pytesseract opencv-python pillow numpy colorama PyYAML requests
        Write-Host "Install complete."
        & "$env:GITHUB_WORKSPACE\Scripts\python.exe" -m pip list

    - name: Verify Python environment
      shell: powershell
      run: |
        & "$env:GITHUB_WORKSPACE\Scripts\python.exe" --version

    - name: Run Basic Sale Flow Test
      shell: powershell
      working-directory: Scripts\POS_Workspace
      run: |
        & "$env:GITHUB_WORKSPACE\Scripts\python.exe" -m pytest "tests\Legistlation\TC014_basic_sale_flow.py" -v --tb=short
      continue-on-error: true
