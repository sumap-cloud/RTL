[tool:pytest]
# Pytest configuration for Client Demo tests
testpaths = .
python_files = TC*.py
python_functions = test_*
python_classes = Test*
addopts = 
    --verbose
    --tb=short
    --strict-markers

# Markers for test categorization
markers =
    smoke: Quick smoke tests
    regression: Regression test suite
    cash_management: Cash management related tests
    age_restriction: Age restriction functionality tests
    critical: Critical functionality tests
