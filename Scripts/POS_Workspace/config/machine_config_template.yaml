# Network Configuration
network_settings:
  # Test execution port for agents
  agent_port: 8080
  
  # Network timeouts (seconds)
  connection_timeout: 30
  execution_timeout: 600
  
  # Security settings
  authentication:
    username: "pos_test_user"      # Replace with actual username
    password: "CHANGE_ME"          # Replace with actual password
    domain: "POS_DOMAIN"           # Replace with actual domain if applicable
  
  # Remote execution method
  remote_method: "winrm"           # Options: winrm, ssh, agent
  
  # Backup execution servers (if primary fails)
  backup_servers:
    - ip: "10.0.0.200"
      name: "BackupTestServer1"
    - ip: "10.0.0.201"
      name: "BackupTestServer2"

# Environment-specific settings
environment_config:
  # Test data paths on remote machines
  remote_test_path: "C:\\POS_Tests"
  remote_reports_path: "C:\\POS_Tests\\Reports"
  
  # POS application paths
  pos_application_path: "C:\\Program Files\\R10PosClient\\R10PosClient.exe"
  pos_data_path: "C:\\POS_Data"
  
  # Test environment setup
  setup_scripts:
    - "setup_test_environment.bat"
    - "reset_pos_database.sql"
    - "configure_test_data.py"

# Steps to Configure Real Machines:

configuration_steps:
  step1_network_discovery:
    description: "Discover and document machine IPs"
    commands:
      - "nmap -sn 10.0.0.0/24  # Scan network for active machines"
      - "ping <machine_ip>     # Test connectivity to each machine"
      - "telnet <machine_ip> 8080  # Test if agent port is accessible"
  
  step2_machine_preparation:
    description: "Prepare each machine for remote testing"
    requirements:
      - "Install Python 3.12+ on each machine"
      - "Install required Python packages"
      - "Configure Windows Remote Management (WinRM)"
      - "Set up test user accounts"
      - "Install test agent service"
  
  step3_connectivity_testing:
    description: "Test connectivity to all machines"
    validation_tests:
      - "Test ping connectivity"
      - "Test WinRM/SSH access"
      - "Test agent HTTP endpoint"
      - "Validate POS application access"
  
  step4_test_deployment:
    description: "Deploy test files to remote machines"
    deployment_items:
      - "Test scripts and components"
      - "Test data files"
      - "Configuration files"
      - "Report templates"

# Security Considerations
security_notes:
  - "Use dedicated test user accounts with limited privileges"
  - "Implement network segmentation for test machines"
  - "Use encrypted connections (HTTPS/SSH)"
  - "Regularly update credentials and certificates"
  - "Monitor and log all test execution activities"
  - "Implement access controls and audit trails"
