          network_zone: "airport_network"

  # Network and Security Configuration
  network_config:
    # Test execution settings
    agent_port: 8080
    connection_timeout: 30
    execution_timeout: 600
    retry_attempts: 3
    
    # Authentication (UPDATE THESE!)
    credentials:
      username: "pos_test_user"     # UPDATE: Replace with actual username
      password: "CHANGE_ME_123!"    # UPDATE: Replace with actual password
      domain: "COMPANY_DOMAIN"      # UPDATE: Replace with actual domain
    
    # Remote execution method
    remote_method: "winrm"          # Options: winrm, ssh, agent
    
    # Network zones and routing
    network_zones:
      store_network:
        gateway: "10.10.0.1"
        dns_servers: ["10.10.0.10", "10.10.0.11"]
        subnet_mask: "255.255.0.0"
      
      express_network:
        gateway: "10.10.0.1"
        dns_servers: ["10.10.0.10"]
        subnet_mask: "255.255.0.0"
      
      franchise_network:
        gateway: "10.10.0.1"
        dns_servers: ["10.10.0.10"]
        subnet_mask: "255.255.0.0"
    
    # Backup and failover
    backup_servers:
      - ip: "10.10.0.200"
        name: "BackupTestServer1"
        role: "primary_backup"
      - ip: "10.10.0.201"
        name: "BackupTestServer2"
        role: "secondary_backup"

  # Test Categories/Drops
  test_drops:
    drop1_basic_sale:
      description: "Basic POS sale functionality"
      tests:
        - "tests/basic_sale/*.py"
      required_capabilities: ["sale"]
      estimated_duration: 300  # seconds
    
    drop2_funds_management:
      description: "Funds management and cash handling"
      tests:
        - "tests/fundsmanagement/*.py"
      required_capabilities: ["funds"]
      estimated_duration: 600
    
    drop3_compliance:
      description: "Age restrictions and legislation"
      tests:
        - "tests/Legistlation/*.py"
      required_capabilities: ["compliance"]
      estimated_duration: 450
    
    drop4_loyalty:
      description: "Customer loyalty functionality"
      tests:
        - "tests/loyalty/*.py"
      required_capabilities: ["loyalty"]
      estimated_duration: 400
    
    drop5_returns:
      description: "Return and refund processing"
      tests:
        - "tests/returns/*.py"
      required_capabilities: ["returns"]
      estimated_duration: 500
    
    drop6_integration:
      description: "End-to-end integration scenarios"
      tests:
        - "tests/integration/*.py"
      required_capabilities: ["sale", "loyalty", "returns"]
      estimated_duration: 900

# Execution Settings
execution:
  parallel_execution: true
  max_concurrent_tests: 3
  retry_failed_tests: 2
  screenshot_on_failure: true
  video_recording: false
  timeout_per_test: 600  # seconds
  
  # Remote machine paths (UPDATE THESE!)
  remote_paths:
    test_directory: "C:\\POS_Tests"
    reports_directory: "C:\\POS_Tests\\Reports"
    temp_directory: "C:\\POS_Tests\\Temp"
    pos_application: "C:\\Program Files\\R10PosClient\\R10PosClient.exe"
    pos_data: "C:\\POS_Data"
    logs_directory: "C:\\POS_Logs"
  
  # Machine preparation scripts
  setup_scripts:
    - name: "setup_test_environment.bat"
      description: "Initialize test environment"
      path: "scripts/setup_test_environment.bat"
    - name: "reset_pos_database.sql"
      description: "Reset POS database to test state"
      path: "scripts/reset_pos_database.sql"
    - name: "configure_test_data.py"
      description: "Configure test data"
      path: "scripts/configure_test_data.py"
  
  # Health check configuration
  health_checks:
    ping_check: true
    port_check: true
    application_check: true
    disk_space_check: true
    memory_check: true
    
  # Performance monitoring
  monitoring:
    collect_performance_metrics: true
    cpu_threshold: 80.0      # Percent
    memory_threshold: 85.0   # Percent
    disk_threshold: 90.0     # Percent
  
# Reporting
reporting:
  generate_html_report: true
  generate_junit_xml: true
  send_email_notification: true
  slack_notification: false
  report_directory: "Reports"
