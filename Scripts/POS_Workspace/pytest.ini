# Enhanced pytest configuration for distributed testing
[pytest]
# Basic configuration
addopts = -v --tb=short --strict-markers
python_files = test_*.py TC*.py
python_classes = Test*
python_functions = test_*

# Test markers for categorization
markers =
    smoke: Quick smoke tests
    regression: Full regression test suite
    integration: Integration test scenarios
    performance: Performance and load tests
    compliance: Regulatory compliance tests
    funds: Funds management tests
    sale: Basic sale functionality tests
    basic_sale: Basic sale functionality tests
    loyalty: Customer loyalty tests
    returns: Return and refund tests
    pos: POS system tests
    slow: Tests that take a long time to run
    dependency: Tests with dependencies on other tests
    banner1: Tests specific to Banner 1
    banner2: Tests specific to Banner 2
    banner3: Tests specific to Banner 3
    banner4: Tests specific to Banner 4
    banner5: Tests specific to Banner 5
    banner6: Tests specific to Banner 6
    machine_specific: Tests that require specific machine configuration
    local: Local framework tests

# Test discovery
testpaths = 
    tests
    .

# Minimum version requirements
minversion = 6.0

# Timeout settings
timeout = 300  # 5 minutes per test
timeout_method = thread

# Log configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# File logging
log_file = Reports/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
